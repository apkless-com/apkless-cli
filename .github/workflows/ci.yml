name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Sensitive info check
        run: |
          echo "Checking for sensitive references..."
          if grep -rni "frida\|mitmproxy\|mitm\|redroid\|podman\|tencent\|supabase\|cloudflare.worker\|bypass\|ssl.pinning\|root.hiding\|nftables\|iptables" --include="*.go" .; then
            echo "::error::Sensitive information found in source code!"
            exit 1
          fi
          echo "Clean."
